name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Shellcheck
        run: |
          set -euo pipefail
          files=$(git ls-files '*.sh')
          if [ -n "$files" ]; then
            # shellcheck disable=SC2086
            shellcheck $files
          fi

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Syntax check tracked JS files
        run: |
          set -euo pipefail
          git ls-files -z '*.js' | xargs -0 -n1 node --check

      - name: Run tests
        run: npm test
