<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cheapest Read</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 13px;
        color: #232f3e;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 15px;
      }
      #status {
        padding: 8px 10px;
        border-radius: 4px;
        background: #f3f3f3;
        margin-bottom: 12px;
        line-height: 1.4;
      }
      #status.on-wishlist {
        background: #e7f7ee;
        color: #0a5c36;
      }
      #status.off-wishlist {
        background: #fff3cd;
        color: #7a5b00;
      }
      button,
      a.button {
        display: block;
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #a88734;
        border-radius: 4px;
        background: #f0c14b;
        font-size: 13px;
        font-weight: 600;
        color: #232f3e;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        box-sizing: border-box;
      }
      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #message {
        margin-top: 10px;
        font-size: 12px;
        color: #555;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Cheapest Read</h1>
    <div id="status">Checking current tab...</div>
    <div id="action"></div>
    <div id="message"></div>
    <script src="popup.js"></script>
  </body>
</html>
